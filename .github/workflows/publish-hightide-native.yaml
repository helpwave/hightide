name: Publish hightide-native

on:
  push:
    branches:
      - main
    paths:
      - "packages/hightide-native/**"
      - ".github/workflows/publish-hightide-native.yaml"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @helpwave/hightide-utils run init
      - run: pnpm --filter @helpwave/hightide-native run init
      - run: pnpm --filter @helpwave/hightide-native build

      - name: Publish @helpwave/hightide-native
        run: pnpm --filter @helpwave/hightide-native publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
